name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Node syntax check
        run: node --check mcp-server/src/server.js
      - name: MCP filter smoke
        run: node mcp-server/test/filter-smoke.mjs
      - name: Release artifact audit
        run: node scripts/check-release.mjs
